name: Build Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.2.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-macos-dmg:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Build DMG
        run: |
          chmod +x build_dmg.sh
          ./build_dmg.sh

      - name: Upload DMG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DigitMaid-dmg
          path: dist/DigitMaid.dmg
          if-no-files-found: error

  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Build EXE
        shell: pwsh
        run: |
          python -m pip install -r requirements.txt pyinstaller==6.16.0
          python -m PyInstaller --noconfirm --clean --windowed --onefile --name DigitMaid --icon icon.ico --add-data "resource;resource" --add-data "src/function/apps.yaml;src/function" --add-data "src/input/dialog_style.yaml;src/input" --add-data "src/ui/maid_animations.yaml;src/ui" src/core/run.py

      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DigitMaid-exe
          path: dist/DigitMaid.exe
          if-no-files-found: error

  publish-release:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    needs:
      - build-macos-dmg
      - build-windows-exe
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          target_commitish: ${{ github.sha }}
          files: |
            release-assets/DigitMaid.dmg
            release-assets/DigitMaid.exe
          generate_release_notes: true
