# --------------------
# 文本描边配置
# --------------------
# outline_button_text: 是否给菜单选项与按钮文字加黑边 (默认: true)
outline_button_text: true

# outline_dialog_text: 是否给对话气泡的文本加黑边 (默认: false)
outline_dialog_text: false

# outline_dialog_bubble: 是否绘制对话气泡自身的黑色大边框 (默认: false)
outline_dialog_bubble: false

# 对话框样式配置 (支持透明 PNG 图片)
# 使用相对于项目根目录的路径（比如：resource/wisdel/bg.png）或绝对路径
# 如果路径对应的文件不存在，或者留空，就会自动回退到默认的粉色方框和按钮样式

# menu_style: "list" 或 "circular"
menu_style: "circular"

# 圆形菜单按钮模式："default" 使用原本纯色气泡；"image" 使用下面配置的图片按钮
circular_button_mode: "image"

# 圆形菜单图片按钮路径（相对项目根目录或绝对路径）
# 普通选项按钮使用 select；返回/退出/翻页按钮使用 quit
# 顶层“关闭”按钮可单独使用 off
circular_btn_select: "resource\\button\\select.png"
circular_btn_quit: "resource\\button\\quit.png"
circular_btn_off: "resource\\button\\off.png"

background: "resource\\button\\background.jpg"

# "桌面"按钮
btn_desktop_normal: ""
btn_desktop_hover: ""
btn_desktop_pressed: ""

# "默认"按钮
btn_default_normal: ""
btn_default_hover: ""
btn_default_pressed: ""

# "不保存"按钮
btn_cancel_normal: ""
btn_cancel_hover: ""
btn_cancel_pressed: ""